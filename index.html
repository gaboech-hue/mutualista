<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#1F3864" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mutualista" />
  <title>Mutualista — Cobros</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --navy: #1F3864;
      --teal: #1D7A5F;
      --teal-light: #E1F5EE;
      --teal-mid: #9FE1CB;
      --blue-light: #E6F1FB;
      --blue: #185FA5;
      --amber: #FFF2CC;
      --amber-dk: #7F6000;
      --red: #FCE4D6;
      --red-dk: #9C0006;
      --gray: #F2F2F2;
      --border: #E0E0E0;
      --text: #1a1a1a;
      --text-muted: #666;
      --text-light: #999;
      --bg: #F7F8FA;
      --card: #FFFFFF;
      --radius: 12px;
      --radius-sm: 8px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 80px; }

    /* ── TOP NAV ── */
    .top-nav { background: var(--navy); color: #fff; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    .top-nav h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
    .week-pill { background: rgba(255,255,255,0.15); font-size: 12px; padding: 4px 10px; border-radius: 20px; }

    /* ── PAGES ── */
    .page { display: none; padding: 16px; }
    .page.active { display: block; }

    /* ── SUMMARY CARDS ── */
    .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .scard { background: var(--card); border-radius: var(--radius-sm); padding: 12px; border: 1px solid var(--border); }
    .scard-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
    .scard-val { font-size: 22px; font-weight: 600; }
    .scard-val.green { color: var(--teal); }
    .scard-val.blue { color: var(--blue); }
    .scard-val.amber { color: #B8860B; }

    /* ── CLIENT CARDS ── */
    .client-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 12px; overflow: hidden; }
    .client-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: #F8F9FC; border-bottom: 1px solid var(--border); cursor: pointer; }
    .client-num { width: 30px; height: 30px; border-radius: 50%; background: var(--blue-light); color: var(--blue); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; }
    .client-info { flex: 1; min-width: 0; }
    .client-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .client-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    .client-total { text-align: right; flex-shrink: 0; }
    .client-total-val { font-size: 15px; font-weight: 600; color: var(--teal); }
    .client-total-pct { font-size: 11px; color: var(--text-muted); }
    .chevron { font-size: 12px; color: var(--text-light); transition: transform 0.2s; margin-left: 4px; }
    .chevron.open { transform: rotate(180deg); }

    /* ── PROGRESS BAR ── */
    .prog-wrap { height: 5px; background: var(--border); }
    .prog-fill { height: 100%; background: var(--teal); transition: width 0.3s; }

    /* ── CLIENT DETAIL ── */
    .client-body { display: none; padding: 12px 14px; border-top: 1px solid var(--border); }
    .client-body.open { display: block; }
    .field-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .field-row label { font-size: 12px; color: var(--text-muted); width: 110px; flex-shrink: 0; }
    .field-row input { flex: 1; font-size: 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 7px 10px; background: #fff; color: var(--text); outline: none; }
    .field-row input:focus { border-color: var(--blue); }
    .weeks-title { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; font-weight: 500; }
    .weeks-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; }
    .wk { border-radius: 6px; border: 1px solid var(--border); padding: 5px 2px; text-align: center; cursor: pointer; transition: background 0.1s; user-select: none; }
    .wk-num { font-size: 10px; font-weight: 600; color: var(--text-muted); }
    .wk-date { font-size: 8px; color: var(--text-light); margin-top: 1px; }
    .wk.paid { background: var(--teal); border-color: #0F6E56; }
    .wk.paid .wk-num { color: #fff; }
    .wk.paid .wk-date { color: var(--teal-mid); }
    .wk.current { border: 2px solid var(--blue); }
    .wk.current .wk-num { color: var(--blue); }

    /* ── CHART PAGE ── */
    .chart-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 14px; margin-bottom: 12px; }
    .chart-card-title { font-size: 14px; font-weight: 600; margin-bottom: 14px; color: var(--text); }
    .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .bar-label { font-size: 12px; color: var(--text-muted); width: 100px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-bg { flex: 1; height: 22px; background: var(--gray); border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--teal); border-radius: 4px; display: flex; align-items: center; padding-left: 6px; transition: width 0.4s; min-width: 0; }
    .bar-fill-label { font-size: 10px; color: #fff; font-weight: 600; white-space: nowrap; }
    .bar-pct { font-size: 11px; color: var(--text-muted); width: 32px; text-align: right; flex-shrink: 0; }

    /* ── BOTTOM NAV ── */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--border); display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 0; font-size: 10px; color: var(--text-muted); cursor: pointer; border: none; background: transparent; gap: 3px; transition: color 0.15s; }
    .nav-btn.active { color: var(--teal); }
    .nav-icon { font-size: 20px; }

    /* ── SETTINGS PAGE ── */
    .section-title { font-size: 13px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; margin-top: 16px; }
    .setting-row { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
    .setting-row span { color: var(--text-muted); font-size: 13px; }
    .danger-btn { width: 100%; padding: 13px; background: #FFF0F0; color: var(--red-dk); border: 1px solid #FFCDD2; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px; }

    /* ── INSTALL BANNER ── */
    .install-banner { background: var(--blue-light); border: 1px solid #B5D4F4; border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
    .install-banner p { font-size: 13px; color: var(--blue); flex: 1; line-height: 1.4; }
    .install-btn { background: var(--blue); color: #fff; border: none; border-radius: var(--radius-sm); padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  </style>
</head>
<body>

<div class="top-nav">
  <h1>&#x1F4B0; Mutualista</h1>
  <div class="week-pill" id="weekPill">Sem — / 44</div>
</div>

<!-- ══ PAGE: CLIENTES ══ -->
<div class="page active" id="page-clientes">
  <div id="installBanner" style="display:none;" class="install-banner">
    <p>Instala esta app en tu celular para acceder sin internet.</p>
    <button class="install-btn" id="installBtn">Instalar</button>
  </div>
  <div class="summary-grid">
    <div class="scard"><div class="scard-label">Total acumulado</div><div class="scard-val green" id="s-total">$0</div></div>
    <div class="scard"><div class="scard-label">Abonos pagados</div><div class="scard-val blue" id="s-paid">0</div></div>
    <div class="scard"><div class="scard-label">Avance promedio</div><div class="scard-val amber" id="s-avg">0%</div></div>
    <div class="scard"><div class="scard-label">Pendientes</div><div class="scard-val" id="s-pending">0</div></div>
  </div>
  <div id="clientList"></div>
</div>

<!-- ══ PAGE: GRÁFICO ══ -->
<div class="page" id="page-grafico">
  <div class="chart-card">
    <div class="chart-card-title">Avance por cliente</div>
    <div id="chartBars"></div>
  </div>
  <div class="chart-card">
    <div class="chart-card-title">Resumen financiero</div>
    <div id="financialSummary"></div>
  </div>
</div>

<!-- ══ PAGE: AJUSTES ══ -->
<div class="page" id="page-ajustes">
  <div class="section-title">Información</div>
  <div class="setting-row">Semanas totales <span>44 sábados</span></div>
  <div class="setting-row">Próximo sábado <span id="nextSat">—</span></div>
  <div class="setting-row">Semana actual <span id="currentSatInfo">—</span></div>
  <div class="setting-row">Versión <span>1.0</span></div>
  <div class="section-title">Datos</div>
  <button class="danger-btn" id="resetAllBtn">&#x26A0;&#xFE0F; Reiniciar todos los datos</button>
</div>

<!-- ══ BOTTOM NAV ══ -->
<nav class="bottom-nav">
  <button class="nav-btn active" data-page="clientes">
    <span class="nav-icon">&#x1F4CB;</span>Clientes
  </button>
  <button class="nav-btn" data-page="grafico">
    <span class="nav-icon">&#x1F4CA;</span>Gráfico
  </button>
  <button class="nav-btn" data-page="ajustes">
    <span class="nav-icon">&#x2699;&#xFE0F;</span>Ajustes
  </button>
</nav>

<script>
const WEEKS = 44;
const KEY = 'mutualista_pwa_v1';

function getSaturdays() {
  const sats = [];
  const d = new Date();
  const day = d.getDay();
  const diff = day === 6 ? 7 : (6 - day);
  const first = new Date(d);
  first.setDate(d.getDate() + diff);
  first.setHours(0,0,0,0);
  for (let i = 0; i < WEEKS; i++) {
    const s = new Date(first);
    s.setDate(first.getDate() + i * 7);
    sats.push(s);
  }
  return sats;
}

function getCurrentWeekIdx(sats) {
  const today = new Date(); today.setHours(0,0,0,0);
  for (let i = 0; i < sats.length; i++) {
    if (sats[i] >= today) return i;
  }
  return sats.length - 1;
}

function fmtDate(d) {
  return d.getDate().toString().padStart(2,'0') + '/' + (d.getMonth()+1).toString().padStart(2,'0');
}
function fmtMoney(n) {
  return '$' + Math.round(n).toLocaleString('es-MX');
}

function load() {
  try { const r = localStorage.getItem(KEY); if (r) return JSON.parse(r); } catch(e) {}
  return { positions: Array.from({length:10}, () => ({name:'', amount:'', weeks:{}})) };
}
function save(state) {
  try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e) {}
}

let state = load();
const saturdays = getSaturdays();
const cwIdx = getCurrentWeekIdx(saturdays);

// Update nav info
document.getElementById('weekPill').textContent = 'Sáb ' + (cwIdx+1) + '/44';
document.getElementById('nextSat').textContent = fmtDate(saturdays[cwIdx]);
document.getElementById('currentSatInfo').textContent = 'Semana ' + (cwIdx+1);

// ── NAV ──
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('page-' + btn.dataset.page).classList.add('active');
    if (btn.dataset.page === 'grafico') renderChart();
  });
});

// ── SUMMARY ──
function updateSummary() {
  let totalPaid = 0, totalAmt = 0, totalPct = 0;
  state.positions.forEach(pos => {
    const paid = Object.values(pos.weeks).filter(Boolean).length;
    const amt = parseFloat(pos.amount) || 0;
    totalPaid += paid;
    totalAmt += paid * amt;
    totalPct += paid / WEEKS;
  });
  document.getElementById('s-total').textContent = fmtMoney(totalAmt);
  document.getElementById('s-paid').textContent = totalPaid;
  document.getElementById('s-avg').textContent = Math.round((totalPct / 10) * 100) + '%';
  document.getElementById('s-pending').textContent = (10 * WEEKS) - totalPaid;
}

// ── CLIENT LIST ──
function renderClients() {
  const list = document.getElementById('clientList');
  list.innerHTML = '';
  state.positions.forEach((pos, pi) => {
    const paid = Object.values(pos.weeks).filter(Boolean).length;
    const amt = parseFloat(pos.amount) || 0;
    const total = paid * amt;
    const pct = Math.round((paid / WEEKS) * 100);

    const card = document.createElement('div');
    card.className = 'client-card';

    card.innerHTML = `
      <div class="client-header" id="hdr-${pi}">
        <div class="client-num">${pi+1}</div>
        <div class="client-info">
          <div class="client-name">${pos.name || 'Cliente ' + (pi+1)}</div>
          <div class="client-sub">${paid} de ${WEEKS} semanas · ${fmtMoney(amt)}/sem</div>
        </div>
        <div class="client-total">
          <div class="client-total-val">${fmtMoney(total)}</div>
          <div class="client-total-pct">${pct}%</div>
        </div>
        <div class="chevron" id="chev-${pi}">&#x25BC;</div>
      </div>
      <div class="prog-wrap"><div class="prog-fill" style="width:${pct}%"></div></div>
      <div class="client-body" id="body-${pi}">
        <div class="field-row">
          <label>Nombre</label>
          <input type="text" placeholder="Nombre del cliente" value="${pos.name}" data-pi="${pi}" data-field="name" />
        </div>
        <div class="field-row">
          <label>Abono semanal</label>
          <input type="number" placeholder="$0.00" value="${pos.amount}" data-pi="${pi}" data-field="amount" min="0" />
        </div>
        <div class="weeks-title">Toca el sábado para marcar abono:</div>
        <div class="weeks-grid" id="wgrid-${pi}"></div>
      </div>
    `;

    list.appendChild(card);

    // Toggle body
    document.getElementById('hdr-' + pi).addEventListener('click', () => {
      const body = document.getElementById('body-' + pi);
      const chev = document.getElementById('chev-' + pi);
      body.classList.toggle('open');
      chev.classList.toggle('open');
    });

    // Input fields
    card.querySelectorAll('input').forEach(inp => {
      inp.addEventListener('input', e => {
        const p = parseInt(e.target.dataset.pi);
        const f = e.target.dataset.field;
        state.positions[p][f] = e.target.value;
        save(state);
        updateSummary();
        // update header name
        const nameEl = card.querySelector('.client-name');
        nameEl.textContent = state.positions[p].name || 'Cliente ' + (p+1);
        const subEl = card.querySelector('.client-sub');
        const pd = Object.values(state.positions[p].weeks).filter(Boolean).length;
        const a = parseFloat(state.positions[p].amount) || 0;
        subEl.textContent = pd + ' de ' + WEEKS + ' semanas · ' + fmtMoney(a) + '/sem';
        const tv = card.querySelector('.client-total-val');
        tv.textContent = fmtMoney(pd * a);
      });
    });

    // Weeks grid
    const grid = document.getElementById('wgrid-' + pi);
    for (let w = 0; w < WEEKS; w++) {
      const cell = document.createElement('div');
      cell.className = 'wk' + (pos.weeks[w] ? ' paid' : '') + (w === cwIdx ? ' current' : '');
      cell.innerHTML = `<div class="wk-num">${w+1}</div><div class="wk-date">${fmtDate(saturdays[w])}</div>`;
      cell.addEventListener('click', () => {
        state.positions[pi].weeks[w] = !state.positions[pi].weeks[w];
        save(state);
        renderClients();
        updateSummary();
      });
      grid.appendChild(cell);
    }
  });
  updateSummary();
}

// ── CHART ──
function renderChart() {
  const bars = document.getElementById('chartBars');
  bars.innerHTML = '';
  state.positions.forEach((pos, pi) => {
    const paid = Object.values(pos.weeks).filter(Boolean).length;
    const pct = Math.round((paid / WEEKS) * 100);
    const label = pos.name || 'Cliente ' + (pi+1);
    const amt = parseFloat(pos.amount) || 0;
    const total = paid * amt;
    const row = document.createElement('div');
    row.className = 'bar-row';
    row.innerHTML = `
      <div class="bar-label" title="${label}">${label}</div>
      <div class="bar-bg">
        <div class="bar-fill" style="width:${pct}%">
          ${pct > 15 ? '<span class="bar-fill-label">' + fmtMoney(total) + '</span>' : ''}
        </div>
      </div>
      <div class="bar-pct">${pct}%</div>
    `;
    bars.appendChild(row);
  });

  // Financial summary
  const fin = document.getElementById('financialSummary');
  let totalAcum = 0, totalMeta = 0;
  state.positions.forEach(pos => {
    const paid = Object.values(pos.weeks).filter(Boolean).length;
    const amt = parseFloat(pos.amount) || 0;
    totalAcum += paid * amt;
    totalMeta += amt * WEEKS;
  });
  fin.innerHTML = `
    <div class="bar-row" style="margin-bottom:8px;">
      <div style="flex:1;font-size:13px;color:var(--text-muted);">Total acumulado</div>
      <div style="font-size:15px;font-weight:600;color:var(--teal);">${fmtMoney(totalAcum)}</div>
    </div>
    <div class="bar-row" style="margin-bottom:8px;">
      <div style="flex:1;font-size:13px;color:var(--text-muted);">Meta total (44 semanas)</div>
      <div style="font-size:15px;font-weight:600;">${fmtMoney(totalMeta)}</div>
    </div>
    <div class="bar-row">
      <div style="flex:1;font-size:13px;color:var(--text-muted);">Faltante</div>
      <div style="font-size:15px;font-weight:600;color:#B8860B;">${fmtMoney(totalMeta - totalAcum)}</div>
    </div>
  `;
}

// ── RESET ──
document.getElementById('resetAllBtn').addEventListener('click', () => {
  if (confirm('¿Reiniciar TODOS los datos? Esta acción no se puede deshacer.')) {
    state = { positions: Array.from({length:10}, () => ({name:'', amount:'', weeks:{}})) };
    save(state);
    renderClients();
  }
});

// ── PWA INSTALL ──
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').style.display = 'flex';
});
document.getElementById('installBtn').addEventListener('click', async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') {
      document.getElementById('installBanner').style.display = 'none';
    }
    deferredPrompt = null;
  }
});

// ── SERVICE WORKER ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

renderClients();
</script>
</body>
</html>
